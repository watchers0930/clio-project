appId: com.bmicns.clio
productName: CLIO
copyright: Copyright © 2026 BMI C&S

directories:
  output: dist-electron

files:
  - electron/**/*
  - node_modules/**/*

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch: [arm64, x64]
  icon: electron/icon.icns

win:
  target:
    - target: nsis
      arch: [x64]
  icon: electron/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerLanguages: [ko]
  language: 1042

dmg:
  title: CLIO 설치
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
